name: stock_management
description: "Stock Management App - Simple inventory management for everyone"
publish_to: 'none'
version: 1.0.25+29

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5

  # State Management
  provider: ^6.1.2

  # Excel Import/Export
  excel: ^4.0.6
  file_picker: ^8.1.7
  share_plus: ^10.1.4
  path_provider: ^2.1.5

  # Charts
  fl_chart: ^0.70.2

  # CSV
  csv: ^6.0.0

  # Utilities
  http: ^1.2.0
  intl: ^0.20.2
  uuid: ^4.5.1
  package_info_plus: ^8.3.0
  web: ^1.1.1
  url_launcher: ^6.3.2
  shared_preferences: ^2.3.4

  # Barcode scanning (Android, iOS, Web)
  mobile_scanner: ^7.2.0

  # PDF generation & printing
  pdf: ^3.11.1
  printing: ^5.13.3
  lottie: ^3.3.0
  connectivity_plus: ^7.1.1
  flutter_animate: ^4.5.2
  flutter_markdown: ^0.7.3
  speech_to_text: ^7.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "logo.png"

flutter:
  uses-material-design: true
  assets:
    - logo.png
    - assets/fonts/NotoSans-Regular.ttf
    - assets/lottie/