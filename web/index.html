<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Simple, powerful inventory management for your business">
  <meta name="theme-color" content="#00897B">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="SmartShelfKart">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>SmartShelfKart</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body { height: 100%; margin: 0; }
    body {
      background: linear-gradient(160deg, #00695c 0%, #00897b 45%, #26a69a 100%);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #flutter-loading {
      position: fixed;
      inset: 0;
      z-index: 2147483647;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #00695c 0%, #00897b 45%, #26a69a 100%);
      transition: opacity 0.35s ease-out;
    }
    #flutter-loading.flutter-loading--hide {
      opacity: 0;
      pointer-events: none;
    }
    #flutter-loading img {
      width: 96px;
      height: 96px;
      border-radius: 20px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.2);
    }
    #flutter-loading h1 {
      margin: 20px 0 6px;
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
    }
    #flutter-loading p {
      margin: 0 24px 28px;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.88);
      text-align: center;
    }
    .flutter-loading__spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: flutter-loading-spin 0.75s linear infinite;
    }
    @keyframes flutter-loading-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="flutter-loading" aria-live="polite" aria-busy="true">
    <img src="icons/Icon-192.png" alt="">
    <h1>SmartShelfKart</h1>
    <p>Simple inventory management</p>
    <div class="flutter-loading__spinner" role="status"></div>
  </div>
  <script>
    (function () {
      var el = document.getElementById('flutter-loading');
      function hideStockmgmtHtmlSplash() {
        if (!el || el.classList.contains('flutter-loading--hide')) return;
        el.classList.add('flutter-loading--hide');
        el.setAttribute('aria-busy', 'false');
        setTimeout(function () {
          if (el && el.parentNode) el.parentNode.removeChild(el);
        }, 400);
      }
      window.hideStockmgmtHtmlSplash = hideStockmgmtHtmlSplash;
      window.addEventListener('stockmgmt-hide-html-splash', hideStockmgmtHtmlSplash);
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
